<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0326 실습</title>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body>

  <!-- 연습1) 아래 변수에 저장된 값을 <div> 태그로 화면에 표시하세요. -->
  <div id="root1"></div>
  <script type="text/babel">

    const name = 'Tom';
    const nameElement = <div>{name}</div>;

    ReactDOM.createRoot(document.getElementById('root1')).render(nameElement);
  </script>

  <!-- 연습2) 아래 객체에 저장된 값 중 model 속성만 <div> 태그로 화면에 표시하세요. -->
  <div id="root2"></div>
  <script type="text/babel">

    const car = {
      model: 'sorento',
      price: 4000,
    };
    const carElement = <div>{car.model}</div>;

    ReactDOM.createRoot(document.getElementById('root2')).render(carElement);
  </script>

  <!-- 연습3) 아래 score 값이 60 이상이면 "합격", 아니면 "불합격"을 <div> 태그로 화면에 표시하세요. -->
  <div id="root3"></div>
  <script type="text/babel">

    const score = 80;
    const resultElement = <div>{score >= 60 ? '합격' : '불합격'}</div>;

    ReactDOM.createRoot(document.getElementById('root3')).render(resultElement);
  </script>

  <!-- 연습4) 아래 변수에 저장된 값이 없으면 "값없음", 값이 있으면 저장된 값을 <div> 태그로 화면에 표시하세요. -->
  <div id="root4"></div>
  <script type="text/babel">

    let value;
    const valueElement = <div>{value ? value : '값없음'}</div>;

    ReactDOM.createRoot(document.getElementById('root4')).render(valueElement);
  </script>

  <!-- 연습5) 아래 color 값이 "r"이면 "red", "g"이면 "green", "b"이면 "blue" 배경색을 <div> 태그에 적용해 화면에 표시하세요. (100 x 100 크기) -->
  <div id="root5"></div>
  <script type="text/babel">

    const color = 'r';

    const style = {
      width: '100px',
      height: '100px',
      backgroundColor:
        color === 'r' ? 'red' :
          color === 'g' ? 'green' :
            color === 'b' ? 'blue' : ''
    };

    const colorElement = <div style={style}></div>;

    ReactDOM.createRoot(document.getElementById('root5')).render(colorElement);
  </script>

</body>

</html>
