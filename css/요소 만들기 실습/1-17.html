<!DOCTYPE html>
<html>

<head>
    <style>
        .box {
            width: 300px;
            height: 250px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background-position: center;
            background-image: url(assets/80f96fff3c156d5cd401a6ab29061ecd75c5c704\ \(1\).jpg);
            background-size: cover;
        }

        .circle {
            width: 24px;
            height: 24px;
            background: #D1D1D1;
            border-radius: 50%;
            position: absolute;
            top: 16px;
            left: 260px;
        }

        .bottom {
            height: 56px;
            background: #00000099;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .title {
            position: absolute;
            top: 8px;
            left: 8px;
            color: white;
            font-size: 12px;
            font-weight: 700;
        }

        .name {
            position: absolute;
            top: 33px;
            left: 8px;
            color: #D1D1D1;
            font-size: 12px;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="box">

        <div class="circle"></div>

        <div class="bottom">
            <div class="title">새로운 시작!</div>
            <div class="name">김작가</div>
        </div>

    </div>

</body>

</html>
