<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Card</title>

    <style>
        .image-box {
            width: 120px;
            height: 170px;
            background: #FFB9B9;
            border-radius: 8px;
            position: relative;
            margin-top: 16px;
            margin-left: 16px;
        }

        .circle {
            width: 24px;
            height: 24px;
            background: #D9D9D9;
            border-radius: 999%;
            position: absolute;
            top: 138px;
            left: 88px;
        }

        .text {
            width: 104px;
            margin-left: 24px;
            font-size: 12px;
            font-weight: 400;
        }
    </style>
</head>

<body>

    <div class="image-box">
        <div class="circle"></div>
    </div>

    <div class="text">
        나른한 브런치 카페, 밖에서 밥먹기
    </div>

</body>

</html>
