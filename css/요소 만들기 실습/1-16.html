<!DOCTYPE html>
<html>

<head>
    <style>
        .box {
            width: 336px;
            border: 1px solid #C2C2C2;
            border-radius: 8px;
            padding: 24px;
            margin: 16px;
            text-align: center;
            box-sizing: border-box;
        }

        .text {
            width: 288px;
            font-size: 16px;
            font-weight: 400;
            margin: 0 auto;
        }

        .login {
            width: 288px;
            height: 48px;
            background: #17B75E;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-top: 8px;
        }

        .links {
            font-size: 14px;
            margin-top: 8px;
        }

        .line {
            color: #D3D5D7;
        }
    </style>
</head>

<body>

    <div class="box">

        <div class="text">
            사이트를 더 안전하고 편리하게 이용하세요.
        </div>

        <button class="login">
            로그인
        </button>

        <div class="links">
            아이디 찾기 <span class="line">|</span>
            비밀번호 찾기 <span class="line">|</span>
            회원가입
        </div>

    </div>

</body>

</html>
