<!DOCTYPE html>
<html>
<head>
<style>

.box{
    width:332px;
    height:100px;
    background:#FFE4E4;
    border-radius:8px;
    position:relative;
}

.left-box{
    width:160px;
    height:100px;
    background:#FFB9B9;
    border-radius:8px;
    position:absolute;
}

.right-box{
    padding:8px;
    margin-left:160px;
}

.tag{
    width:96px;
    height:19px;
    background:#FFB9B9;
    border-radius:2px;
    color:white;
    font-size:12px;
    font-weight: 400;
    text-align:center;
    line-height:19px;
}

.title{
    font-size:16px;
    margin-top:8px;
    color: #000000;
}

.text{
    font-size:14px;
    color:#8B8B8B;
    margin-top:8px;
}

</style>
</head>

<body>

<div class="box">
    <div class="left-box"></div>

    <div class="right-box">
        <div class="tag">반가워요!</div>
        <div class="title">좋은하루보내세요!</div>
        <div class="text">날씨가 좋네요!</div>
    </div>
</div>

</body>
</html>
