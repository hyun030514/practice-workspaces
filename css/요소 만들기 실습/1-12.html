<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box {
        width: 320px;
        height: 320px;
        margin-top: 16px;
        margin-left: 16px;
        background-image: url(assets/ae952014cdd66cc9657b0dc753deb0628a21778a.jpg);
        background-size: 160%;
        background-position: center;
        position: relative;
    }

    .title {
        color: white;
        font-size: 24px;
        font-weight: 700;
        padding-left: 16px;
        padding-top: 16px;

    .circle {
        width: 32px;
        height: 32px;
        position: absolute;
        border-radius: 999px;
    }

    .c1 {
        top: 16px;
        left: 272px;
        background: #E3FF92;
    }

    .c2 {
        top: 272px;
        left: 272px;
        background: #FF9292;
    }

    .c3 {
        top: 272px;
        left: 16px;
        background: #92F8FF;

    }
</style>

<body>
    <div class="box">
        <div class="title">인테리어 디자인</div>
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>

</body>

</html>
