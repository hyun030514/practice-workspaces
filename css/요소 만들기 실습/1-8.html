<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>

    <style>
        .container {
            width: 160px;
            height: 240px;
            border-radius: 4px;
            overflow: hidden;
        }

        .image {
            width: 160px;
            height: 172px;
            background-image: url("assets/img2.jpg");
            background-size: 350%;
            background-position: 55%;
        }

        .text {
            height: 68px;
            background: #CA785C;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.5%;
            padding: 6px 8px;
        }

        .box {
            display: flex;
            justify-content: space-between;
            padding: 0 8px 8px 8px;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="image"></div>

        <div class="text">

            <div class="title">인테리어란?</div>

            <div class="box">
                <div>김작가</div>
                <div>2024.01.01</div>
            </div>

        </div>

    </div>

</body>

</html>
