<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미션</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <h1>미션</h1>
  <div id="root"></div>
  <div id="root"></div>
  <div id="root"></div>

  <script type="text/babel">

    function App() {
      return (
        <>
          {/* 미션1) 아래와 같이 컴포넌트를 호출할 때 전달한 color를 배경색으로 가지도록 컴포넌트를 구현하세요. 박스크기(100*100) */}
          <ColorBox color={"red"} />
          <ColorBox color={"green"} />

          {/* 미션2) 아래와 같이 컴포넌트를 호출할 때 전달한 data를 리스트 형태로 출력하도록 컴포넌트를 구현하세요. */}
          <Items data={["봄", "여름", "가을", "겨울"]} />
          <Items data={["김치찌개", "된장찌개"]} />

          {/* 미션3) 아래와 같이 컴포넌트를 호출할 때 전달한 friend 객체의 속성값을 출력하도록 컴포넌트를 구현하세요. */}
          <Person friend={{ name: "jack", age: 20 }} />
          <Person friend={{ name: "john", age: 30 }} />

          {/* 미션4) 아래와 같이 컴포넌트를 호출할 때 내부 요소로 전달한 값을 정사각형의 너비로 계산하여 정사각형의 넓이를 출력하는 컴포넌트를 구현하세요. */}
          <Square>5</Square>
          <Square>10</Square>
        </>
      )
    }

    // 각 미션에 해당하는 컴포넌트들 만들어보기

    // 미션1) color를 전달받아서 해당 색상의 박스를 출력
    const ColorBox = (props) => {
      return (
        <div style={{
          width: 100,
          height: 100,
          backgroundColor: props.color
        }}></div>
      )
    }

    // 미션2) data 배열을 전달받아서 리스트로 출력
    const Items = (props) => {
      return (
        <ul>
          {props.data.map((item, i) => {
            return <li key={i}>{item}</li>
          })}
        </ul>
      )
    }

    // 미션3) friend 객체의 name, age 출력
    const Person = (props) => {
      return (
        <div>
          <div>name : {props.friend.name}</div>
          <div>age : {props.friend.age}</div>
        </div>
      )
    }

    // 미션4) children 값을 이용해서 정사각형 넓이 계산
    const Square = (props) => {
      return (
        <div>
          정사각형 넓이 : {props.children * props.children}
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>

</html>
